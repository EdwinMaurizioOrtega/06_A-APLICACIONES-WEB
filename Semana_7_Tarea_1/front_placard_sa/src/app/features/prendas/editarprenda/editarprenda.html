<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-warning text-white">
      <h4 class="mb-0">✏️ Editar Prenda</h4>
    </div>

    <div class="card-body">
      <form [formGroup]="frmPrenda" novalidate (submit)="actualizar()">
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Código</label>
            <input type="text" class="form-control" formControlName="codigo" />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" formControlName="nombre" />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Categoría</label>
            <select class="form-control" formControlName="categoria">
              <option>Vestidos</option><option>Chaquetas</option><option>Blusas</option>
              <option>Camisetas</option><option>Pantalones</option><option>Faldas</option>
              <option>Accesorios</option><option>Calzado</option><option>Otra</option>
            </select>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Talla</label>
            <select class="form-control" formControlName="talla">
              <option>XS</option><option>S</option><option>M</option>
              <option>L</option><option>XL</option><option>XXL</option><option>Única</option>
            </select>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Color</label>
            <input type="text" class="form-control" formControlName="color" />
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Material</label>
            <input type="text" class="form-control" formControlName="material" />
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Precio</label>
            <input type="number" step="0.01" class="form-control" formControlName="precio" />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Estado</label>
            <select class="form-control" formControlName="estado">
              <option>Disponible</option><option>Reservado</option><option>Vendido</option>
            </select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Ubicación</label>
            <input type="text" class="form-control" formControlName="ubicacion" />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Vendedor</label>
            <input type="text" class="form-control" formControlName="vendedor" />
          </div>
          <div class="col-12 mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" rows="2" formControlName="descripcion"></textarea>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-warning">💾 Actualizar</button>
          <button type="button" class="btn btn-secondary" routerLink="/prendas">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
</div>
