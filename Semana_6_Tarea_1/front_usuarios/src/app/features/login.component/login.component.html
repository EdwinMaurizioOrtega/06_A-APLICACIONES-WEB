<div class="login-wrapper">
  <div class="login-card">
    <div class="text-center mb-4">
      <h2 class="fw-bold">
        <span class="text-gradient">NEXT</span>GEN
      </h2>
      <p class="text-muted small">
        {{ modoRegistro() ? 'Crea tu cuenta' : 'Inicia sesión en tu cuenta' }}
      </p>
    </div>

    @if (mensajeError()) {
      <div class="alert alert-danger py-2 small" role="alert">
        {{ mensajeError() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label small fw-semibold">Correo Electrónico</label>
        <input
          type="email"
          class="form-control form-control-lg"
          [(ngModel)]="email"
          name="email"
          placeholder="correo@ejemplo.com"
          required
        />
      </div>

      @if (modoRegistro()) {
        <div class="mb-3">
          <label class="form-label small fw-semibold">Nombre Completo</label>
          <input
            type="text"
            class="form-control form-control-lg"
            [(ngModel)]="nombreCompleto"
            name="nombreCompleto"
            placeholder="Tu nombre completo"
            required
          />
        </div>
      }

      <div class="mb-3">
        <label class="form-label small fw-semibold">Contraseña</label>
        <input
          type="password"
          class="form-control form-control-lg"
          [(ngModel)]="password"
          name="password"
          placeholder="Ingresa tu contraseña"
          required
        />
      </div>

      @if (modoRegistro()) {
        <div class="mb-3">
          <label class="form-label small fw-semibold">Confirmar Contraseña</label>
          <input
            type="password"
            class="form-control form-control-lg"
            [(ngModel)]="confirmarPassword"
            name="confirmarPassword"
            placeholder="Repite la contraseña"
            required
          />
        </div>
      }

      <button
        type="submit"
        class="btn btn-gradient w-100 py-2 fw-semibold"
        [disabled]="cargando()"
      >
        @if (cargando()) {
          <span class="spinner-border spinner-border-sm me-2" role="status"></span>
        }
        {{ modoRegistro() ? 'Crear Cuenta' : 'Iniciar Sesión' }}
      </button>
    </form>

    <div class="text-center mt-3">
      <button class="btn btn-link text-decoration-none small" (click)="toggleModo()">
        @if (modoRegistro()) {
          ¿Ya tienes cuenta? Inicia sesión
        } @else {
          ¿No tienes cuenta? Regístrate
        }
      </button>
    </div>
  </div>
</div>
