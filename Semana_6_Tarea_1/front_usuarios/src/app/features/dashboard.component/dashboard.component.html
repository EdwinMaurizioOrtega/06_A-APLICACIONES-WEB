<div class="dashboard-wrapper">
  <div class="dashboard-card text-center">
    <div class="avatar-circle mb-3">
      <span class="avatar-initials">{{ usuario?.nombre_completo?.charAt(0) || 'U' }}</span>
    </div>

    <h3 class="fw-bold mb-1">
      ¡Bienvenido, {{ usuario?.nombre_completo || 'Usuario' }}!
    </h3>
    <p class="text-muted mb-4">
      Has iniciado sesión correctamente
    </p>

    <div class="user-info-card text-start p-4 mb-4">
      <div class="row g-3">
        <div class="col-12">
          <label class="small text-muted text-uppercase fw-semibold">Usuario</label>
          <p class="fw-semibold mb-0">{{ usuario?.username }}</p>
        </div>
        <div class="col-12">
          <label class="small text-muted text-uppercase fw-semibold">Correo Electrónico</label>
          <p class="fw-semibold mb-0">{{ usuario?.email }}</p>
        </div>
        <div class="col-12">
          <label class="small text-muted text-uppercase fw-semibold">ID Usuario</label>
          <p class="fw-semibold mb-0">#{{ usuario?.id }}</p>
        </div>
      </div>
    </div>

    <button class="btn btn-danger px-4 py-2 rounded-pill" (click)="cerrarSesion()">
      Cerrar Sesión
    </button>
  </div>
</div>
